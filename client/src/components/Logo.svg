<svg width="130" height="36" viewBox="0 0 130 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ═══ LOGO MARK ═══ -->
  <!-- Speech bubble base (subtle fill) -->
  <path d="M4 7C4 4.24 6.24 2 9 2H23C25.76 2 28 4.24 28 7V17C28 19.76 25.76 22 23 22H15L9 28V22H9C6.24 22 4 19.76 4 17V7Z"
    fill="#00d4ff" fill-opacity="0.08"
    stroke="#00d4ff" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Network nodes forming a "?" — blue top arc -->
  <circle cx="11" cy="10" r="2" fill="#00b4d8"/>
  <circle cx="16" cy="8" r="2.4" fill="#00d4ff"/>
  <circle cx="21" cy="10" r="2" fill="#0096c7"/>

  <!-- Orange mid nodes (stem transition) -->
  <circle cx="23" cy="14" r="1.9" fill="#f8961e"/>
  <circle cx="23.5" cy="17.5" r="2" fill="#f77f00"/>

  <!-- Green bottom dot -->
  <circle cx="16" cy="24" r="2.2" fill="#06d6a0"/>

  <!-- Network edges connecting nodes -->
  <line x1="11" y1="10" x2="16" y2="8" stroke="#00b4d8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="16" y1="8" x2="21" y2="10" stroke="#00b4d8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="21" y1="10" x2="23" y2="14" stroke="#0096c7" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="23" y1="14" x2="23.5" y2="17.5" stroke="#f8961e" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="23.5" y1="17.5" x2="16" y2="24" stroke="#06d6a0" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Ghost question-mark curve (subtle background guide) -->
  <path d="M10 12C10.5 9 13 7.5 16 7.5C19.5 7.5 22 9.5 22.5 12.5C23 15.5 22.5 17 21 19C19.5 21 17.5 22 16 24"
    stroke="#00d4ff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.2"/>

  <!-- ═══ WORDMARK ═══ -->
  <!-- "Crowd" -->
  <text x="34" y="17" font-family="Outfit, Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#e2e8f0" letter-spacing="-0.4">Crowd</text>

  <!-- "Source" -->
  <text x="93" y="17" font-family="Outfit, Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#00d4ff" letter-spacing="-0.4">Source</text>

  <!-- "FAQ" — spaced caps, green accent -->
  <text x="34" y="32" font-family="Outfit, Inter, system-ui, sans-serif" font-size="8.5" font-weight="700" fill="#06d6a0" letter-spacing="2.5">FAQ</text>
</svg>